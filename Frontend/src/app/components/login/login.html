<div class="login-container">
  <div class="login-card">
    <h2>{{ esRegistro ? 'Registrate' : 'Iniciar Sesión' }}</h2>

    <form [formGroup]="formulario" (ngSubmit)="onSubmit()">
      <div *ngIf="esRegistro" class="form-group">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" formControlName="nombre" placeholder="Juan Pérez" />
      </div>

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" formControlName="email" placeholder="ejemplo@correo.com" />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" formControlName="password" placeholder="********" />
      </div>
      <p
        style="text-align: center; color: #0056b3; cursor: pointer; margin-top: 1rem"
        (click)="cambiarModo()"
      >
        {{ esRegistro ? '¿Ya tienes cuenta? Inicia sesión' : '¿No tienes cuenta? Regístrate' }}
      </p>

      <button type="submit">{{ esRegistro ? 'Registrarse' : 'Entrar' }}</button>
    </form>
  </div>
</div>
